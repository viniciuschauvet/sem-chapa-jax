<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Footvolley Jax — Tournament Manager</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d0d; color: #e8e8e8; }
.container { max-width: 700px; margin: 0 auto; padding: 16px; }
.tab-bar { display: flex; gap: 2px; border-bottom: 1px solid #2a2a2a; margin-bottom: 16px; overflow-x: auto; }
.tab { font-size: 13px; font-weight: 600; padding: 10px 14px; cursor: pointer; border: none; background: none; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
.tab.active { color: #C9962A; border-bottom-color: #C9962A; }
.screen { display: none; }
.screen.active { display: block; }
.section-title { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 10px; }
.card { background: #181818; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px 20px; margin-bottom: 14px; }
.group-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.group-badge { font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 20px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { font-size: 11px; font-weight: 600; color: #555; text-align: left; padding: 6px 8px; border-bottom: 1px solid #2a2a2a; }
td { padding: 7px 8px; border-bottom: 1px solid #222; vertical-align: middle; color: #e8e8e8; }
tr:last-child td { border-bottom: none; }
.score-input { width: 42px; text-align: center; font-size: 14px; padding: 5px 4px; border: 1px solid #333; border-radius: 6px; background: #222; color: #e8e8e8; }
.vs { color: #555; font-size: 13px; }
.badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
.badge-done { background: #1a3a1a; color: #6dbf6d; }
.badge-pending { background: #222; color: #555; }
.btn-primary { font-size: 13px; padding: 8px 18px; border-radius: 8px; cursor: pointer; background: #C9962A; color: #fff; border: none; font-weight: 600; }
.btn-primary:hover { background: #e0a930; }
.btn-secondary { font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; background: #222; color: #aaa; border: 1px solid #333; }
.btn-secondary:hover { background: #2a2a2a; }
.btn-danger { font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; background: #3a1010; color: #e87a7a; border: 1px solid #5a2020; font-weight: 600; }
.btn-danger:hover { background: #4a1515; }
.btn-draw { font-size: 15px; padding: 12px 24px; border-radius: 8px; cursor: pointer; background: #C9962A; color: #0d0d0d; border: none; font-weight: 700; width: 100%; margin-top: 8px; }
.btn-draw:hover { background: #e0a930; }
.btn-playoff { font-size: 14px; padding: 10px 24px; border-radius: 8px; cursor: pointer; background: #1a0d2e; color: #b87ae8; border: 1px solid #4a2a6a; font-weight: 700; width: 100%; margin-top: 4px; }
.btn-playoff:hover { background: #2a1040; }
input[type=text] { font-size: 14px; padding: 8px 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #e8e8e8; width: 100%; outline: none; }
input[type=text]:focus, input[type=number]:focus { border-color: #C9962A; }
input[type=number] { font-size: 14px; padding: 6px 10px; border-radius: 8px; border: 1px solid #333; background: #222; color: #e8e8e8; outline: none; }
input[type=number]:disabled { opacity: 0.4; cursor: not-allowed; }
.player-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
.player-add-row input { flex: 1; }
.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; margin-bottom: 10px; }
.player-chip { display: flex; align-items: center; justify-content: space-between; background: #222; border: 1px solid #2e2e2e; border-radius: 8px; padding: 6px 8px 6px 12px; font-size: 13px; gap: 6px; }
.player-chip span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.remove-btn { background: none; border: none; cursor: pointer; color: #555; font-size: 14px; padding: 0 2px; line-height: 1; }
.remove-btn:hover { color: #e53935; }
.draw-grid { display: grid; gap: 8px; margin-top: 14px; }
.team-col { border-radius: 8px; padding: 12px 14px; border: 1px solid #2a2a2a; }
.team-col-title { font-size: 12px; font-weight: 700; margin: 0 0 8px; }
.team-player { font-size: 13px; padding: 3px 0; }
.info-text { font-size: 13px; color: #666; }
.config-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
.config-item label { display: block; font-size: 11px; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.qual-badge { display: inline-block; font-size: 11px; background: #1a0d2e; color: #b87ae8; border: 1px solid #4a2a6a; border-radius: 20px; padding: 2px 10px; margin-left: 8px; font-weight: 600; }
/* Playoff bracket */
.bracket-round { margin-bottom: 20px; }
.round-title { font-size: 12px; font-weight: 700; color: #C9962A; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
.match-card { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.match-card.final-match { border-color: #C9962A44; background: #1e1700; }
.match-team { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
.match-team:first-child { border-bottom: 1px solid #2a2a2a; margin-bottom: 6px; padding-bottom: 8px; }
.match-team-name { font-size: 14px; font-weight: 600; flex: 1; color: #e8e8e8; }
.match-team-name.winner { color: #6dbf6d; }
.match-team-name.loser { color: #555; }
.match-team-name.bye { color: #444; font-style: italic; font-weight: 400; }
.match-score { width: 42px; text-align: center; font-size: 14px; padding: 4px 4px; border: 1px solid #333; border-radius: 6px; background: #222; color: #e8e8e8; }
.match-score:disabled { opacity: 0.4; }
.tbd { color: #444; font-size: 13px; font-style: italic; }
.winner-crown { font-size: 28px; text-align: center; margin: 10px 0 4px; }
.winner-name { font-size: 18px; font-weight: 700; color: #F5C842; text-align: center; }
.col-time { }
@keyframes pop { 0%{transform:scale(0.93);opacity:0.3} 100%{transform:scale(1);opacity:1} }
.draw-anim { animation: pop 0.3s ease; }
@media (max-width: 500px) {
  .container { padding: 10px; }
  .tab { font-size: 11px; padding: 8px 10px; }
  .card { padding: 12px 12px; }
  .config-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
  .col-time { display: none; }
  .score-input, .match-score { width: 36px; font-size: 13px; }
  th, td { padding: 5px 5px; font-size: 12px; }
  .btn-draw { font-size: 14px; padding: 10px; }
}
@media (max-width: 380px) {
  .config-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<div class="tab-bar">
  <button class="tab active" onclick="showTab('players')">Players & Draw</button>
  <button class="tab" onclick="showTab('groups')">Group Stage</button>
  <button class="tab" onclick="showTab('playoffs')">Playoffs</button>
</div>

<!-- ── PLAYERS TAB ── -->
<div id="tab-players" class="screen active">

  <div class="card">
    <p class="section-title">Add players</p>
    <div class="player-add-row">
      <input type="text" id="player-input" placeholder="Player name..." onkeydown="if(event.key==='Enter')addPlayer()" />
      <button class="btn-primary" onclick="addPlayer()">Add</button>
    </div>
    <div class="player-grid" id="player-grid"></div>
    <p class="info-text" id="player-count">0 players added</p>
  </div>

  <div class="card">
    <p class="section-title">Tournament format</p>
    <div class="config-grid">
      <div class="config-item">
        <label>Teams</label>
        <input type="number" id="cfg-teams" min="2" max="64" value="8" oninput="updateConfig()" style="width:100%" />
      </div>
      <div class="config-item">
        <label>Groups</label>
        <input type="number" id="cfg-groups" min="1" max="16" value="1" oninput="updateConfig()" style="width:100%" />
      </div>
      <div class="config-item">
        <label>Qualify / group</label>
        <input type="number" id="cfg-qualify" min="1" max="16" value="2" oninput="updateConfig()" style="width:100%" />
      </div>
    </div>
    <p id="config-summary" class="info-text"></p>
  </div>

  <div class="card">
    <p class="section-title">Draw</p>
    <button class="btn-draw" onclick="runDraw()">🎲 Draw teams</button>
    <div class="draw-grid" id="draw-result" style="display:none"></div>
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end" id="draw-actions" style="display:none">
      <button class="btn-secondary" id="redraw-btn" style="display:none" onclick="runDraw()">Redraw</button>
      <button class="btn-primary" id="apply-btn" style="display:none" onclick="applyDraw()">Apply to tournament →</button>
    </div>
  </div>

</div>

<!-- ── GROUP STAGE TAB ── -->
<div id="tab-groups" class="screen">
  <div id="group-stage-content">
    <div class="card" style="text-align:center;padding:32px 20px">
      <p class="info-text">Run the draw first to set up groups.</p>
    </div>
  </div>
</div>

<!-- ── PLAYOFFS TAB ── -->
<div id="tab-playoffs" class="screen">
  <div id="playoff-content">
    <div class="card" style="text-align:center;padding:32px 20px">
      <p class="info-text" style="margin-bottom:16px">Complete the group stage, then generate the playoff bracket.</p>
      <button class="btn-playoff" onclick="generatePlayoffs()">Generate playoffs →</button>
    </div>
  </div>
</div>

</div><!-- /container -->

<!-- RESET MODAL -->
<div id="reset-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center;">
  <div style="background:#1a1a1a;border:1px solid #333;border-radius:14px;padding:28px;max-width:320px;width:90%;text-align:center;">
    <div style="font-size:32px;margin-bottom:12px">⚠️</div>
    <p style="font-size:16px;font-weight:700;margin-bottom:8px">Reset everything?</p>
    <p style="font-size:13px;color:#888;margin-bottom:24px">Deletes all players, groups, scores and results. Cannot be undone.</p>
    <div style="display:flex;gap:10px">
      <button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn-danger" style="flex:1" onclick="resetAll()">Yes, reset</button>
    </div>
  </div>
</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────
const STORAGE_KEY = 'semchapajax_v2';
const GROUP_COLORS = [
  {bg:'#1a1200',border:'#5a3e00',title:'#F5C842',text:'#c9a84c',badge:'#2a1e00',badgeText:'#F5C842'},
  {bg:'#0d1a0d',border:'#1a4a1a',title:'#6dbf6d',text:'#55a855',badge:'#0d2a0d',badgeText:'#6dbf6d'},
  {bg:'#0d0d1a',border:'#1a1a4a',title:'#6aadeb',text:'#5090cc',badge:'#0d0d2a',badgeText:'#6aadeb'},
  {bg:'#1a0d0d',border:'#4a1a1a',title:'#e87a7a',text:'#cc5555',badge:'#2a0d0d',badgeText:'#e87a7a'},
  {bg:'#1a001a',border:'#4a004a',title:'#d87ae8',text:'#b855cc',badge:'#2a002a',badgeText:'#d87ae8'},
  {bg:'#001a1a',border:'#004a4a',title:'#5adada',text:'#38b8b8',badge:'#002a2a',badgeText:'#5adada'},
  {bg:'#0d1a00',border:'#2a4a00',title:'#a0d45a',text:'#80b840',badge:'#0d2a00',badgeText:'#a0d45a'},
  {bg:'#1a0800',border:'#4a2000',title:'#e8a05a',text:'#cc7838',badge:'#2a0e00',badgeText:'#e8a05a'},
];

// ─── STATE ───────────────────────────────────────────────
let players = [];
let groups = [];          // [{name, teams, pairs, scores}]
let drawnGroups = null;   // temp before applying
let playoffBracket = [];  // array of rounds [{teamA,teamB,scoreA,scoreB,winner}]
let playoffGenerated = false;
let cfgTeams = 8, cfgGroups = 1, cfgQualify = 2;

// ─── PERSISTENCE ─────────────────────────────────────────
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({players,groups,playoffBracket,playoffGenerated,cfgTeams,cfgGroups,cfgQualify}));
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    players = s.players || [];
    groups = s.groups || [];
    playoffBracket = s.playoffBracket || [];
    playoffGenerated = s.playoffGenerated || false;
    cfgTeams = s.cfgTeams || 8;
    cfgGroups = s.cfgGroups || 1;
    cfgQualify = s.cfgQualify || 2;
    return true;
  } catch(e) { return false; }
}

// ─── TABS ─────────────────────────────────────────────────
function showTab(name) {
  const names = ['players','groups','playoffs'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ─── PLAYERS ──────────────────────────────────────────────
function addPlayer() {
  const inp = document.getElementById('player-input');
  const name = inp.value.trim(); if (!name) return;
  players.push(name); inp.value = ''; inp.focus();
  renderPlayers(); saveState();
}
function removePlayer(i) { players.splice(i,1); renderPlayers(); saveState(); }
function renderPlayers() {
  const grid = document.getElementById('player-grid'); grid.innerHTML = '';
  players.forEach((p,i) => {
    const chip = document.createElement('div'); chip.className = 'player-chip';
    chip.innerHTML = `<span title="${p}">${p}</span><button class="remove-btn" onclick="removePlayer(${i})">✕</button>`;
    grid.appendChild(chip);
  });
  document.getElementById('player-count').textContent = `${players.length} player${players.length!==1?'s':''} added`;
}

// ─── CONFIG ───────────────────────────────────────────────
function updateConfig() {
  cfgTeams   = Math.max(2, parseInt(document.getElementById('cfg-teams').value) || 2);
  cfgGroups  = Math.max(1, parseInt(document.getElementById('cfg-groups').value) || 1);
  cfgQualify = Math.max(1, parseInt(document.getElementById('cfg-qualify').value) || 1);

  // Rules
  if (cfgTeams <= 5 && cfgGroups > 1) { cfgGroups = 1; document.getElementById('cfg-groups').value = 1; }
  const maxGroups = Math.floor(cfgTeams / 2);
  if (cfgGroups > maxGroups) { cfgGroups = maxGroups; document.getElementById('cfg-groups').value = maxGroups; }

  const teamsPerGroup = Math.ceil(cfgTeams / cfgGroups);
  const maxQ = teamsPerGroup;
  if (cfgQualify > maxQ) { cfgQualify = Math.max(1, maxQ); document.getElementById('cfg-qualify').value = cfgQualify; }

  const totalPlayoff = cfgGroups * cfgQualify;
  const gamesPerGroup = (teamsPerGroup * (teamsPerGroup - 1)) / 2;
  const totalGames = cfgGroups * gamesPerGroup;

  document.getElementById('config-summary').textContent =
    `${cfgTeams} teams · ${cfgGroups} group${cfgGroups>1?'s':''} · ${totalGames} group games · ${totalPlayoff} teams in playoffs`;

  // Disable groups if ≤5 teams
  document.getElementById('cfg-groups').disabled = cfgTeams <= 5;
}

// ─── DRAW ─────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function runDraw() {
  updateConfig();
  const playersNeeded = players.length;
  if (playersNeeded < cfgTeams) { alert(`Add at least ${cfgTeams} players to draw ${cfgTeams} teams.`); return; }

  const shuffled = shuffle(players);
  const playersPerTeam = Math.floor(shuffled.length / cfgTeams);
  const extras = shuffled.length % cfgTeams; // first N teams get one extra player

  // Build teams: each team is an array of player names
  const teams = [];
  let idx = 0;
  for (let t = 0; t < cfgTeams; t++) {
    const size = playersPerTeam + (t < extras ? 1 : 0);
    teams.push(shuffled.slice(idx, idx + size));
    idx += size;
  }

  // Team label: join player names
  const teamNames = teams.map(t => t.join(' / '));

  // Distribute teams across groups
  drawnGroups = Array.from({length: cfgGroups}, () => []);
  teamNames.forEach((name, i) => drawnGroups[i % cfgGroups].push(name));

  const result = document.getElementById('draw-result');
  const cols = Math.min(cfgGroups, 4);
  result.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  result.style.display = 'grid'; result.innerHTML = '';
  result.classList.add('draw-anim'); setTimeout(() => result.classList.remove('draw-anim'), 400);

  drawnGroups.forEach((members, gi) => {
    const c = GROUP_COLORS[gi % GROUP_COLORS.length];
    const groupName = cfgGroups > 1 ? `Group ${String.fromCharCode(65+gi)}` : 'Teams';
    const div = document.createElement('div'); div.className = 'team-col';
    div.style.cssText = `background:${c.bg};border-color:${c.border}`;
    div.innerHTML = `<p class="team-col-title" style="color:${c.title}">${groupName}</p>`
      + members.map(m => `<div class="team-player" style="color:${c.text}">${m}</div>`).join('');
    result.appendChild(div);
  });

  document.getElementById('redraw-btn').style.display = 'inline-block';
  document.getElementById('apply-btn').style.display = 'inline-block';
}

function applyDraw() {
  if (!drawnGroups) return;
  groups = drawnGroups.map((members, gi) => {
    const teams = members.map(m => m);
    const pairs = [];
    for (let i = 0; i < teams.length; i++) for (let j = i+1; j < teams.length; j++) pairs.push([i,j]);
    return {
      name: cfgGroups > 1 ? `Group ${String.fromCharCode(65+gi)}` : 'Group Stage',
      teams, pairs,
      scores: pairs.map(() => ({h:null, a:null}))
    };
  });
  playoffBracket = []; playoffGenerated = false;
  showTab('groups');
  renderGroupStage();
  saveState();
}

// ─── GROUP STAGE ──────────────────────────────────────────
function renderGroupStage() {
  const container = document.getElementById('group-stage-content');
  if (!groups.length) {
    container.innerHTML = '<div class="card" style="text-align:center;padding:32px 20px"><p class="info-text">Run the draw first to set up groups.</p></div>';
    return;
  }

  let html = '';
  groups.forEach((g, gi) => {
    const c = GROUP_COLORS[gi % GROUP_COLORS.length];
    const standings = getGroupStandings(g);
    const baseTime = 19 * 60;

    html += `<div class="card">
      <div class="group-header">
        <span class="group-badge" style="background:${c.badge};color:${c.badgeText}">${g.name}</span>
        <span class="info-text">${g.teams.length} teams · ${g.pairs.length} games</span>
      </div>
      <table style="margin-bottom:14px">
        <thead><tr>
          <th style="width:32px">#</th>
          <th class="col-time" style="width:64px">Time</th>
          <th>Home</th>
          <th style="width:96px;text-align:center">Score</th>
          <th>Away</th>
          <th style="width:56px;text-align:center">Status</th>
        </tr></thead>
        <tbody>`;

    g.pairs.forEach(([hi, ai], idx) => {
      const s = g.scores[idx]; const done = s.h !== null && s.a !== null;
      const mins = baseTime + idx * 30;
      const t = `${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;
      html += `<tr>
        <td style="color:#555;font-size:12px">${idx+1}</td>
        <td class="col-time"><input class="time-input score-input" type="text" value="${t}" style="width:60px" /></td>
        <td style="font-weight:600;font-size:13px">${g.teams[hi]}</td>
        <td style="text-align:center">
          <div style="display:flex;align-items:center;gap:3px;justify-content:center">
            <input class="score-input" type="number" min="0" max="99" value="${s.h??''}" placeholder="—" oninput="setGroupScore(${gi},${idx},'h',this.value)" />
            <span class="vs">×</span>
            <input class="score-input" type="number" min="0" max="99" value="${s.a??''}" placeholder="—" oninput="setGroupScore(${gi},${idx},'a',this.value)" />
          </div>
        </td>
        <td style="font-weight:600;font-size:13px">${g.teams[ai]}</td>
        <td style="text-align:center"><span class="badge ${done?'badge-done':'badge-pending'}">${done?'Done':'—'}</span></td>
      </tr>`;
    });

    html += `</tbody></table>`;

    // Mini standings
    html += `<p class="section-title" style="margin-bottom:8px">Standings
      <span class="qual-badge">${cfgQualify} qualify</span></p>
      <table><thead><tr>
        <th style="width:28px">#</th><th>Team</th>
        <th style="text-align:center;width:30px">P</th>
        <th style="text-align:center;width:30px">W</th>
        <th style="text-align:center;width:30px">L</th>
        <th style="text-align:center;width:52px">Pts F/A</th>
        <th style="text-align:center;width:38px">+/-</th>
        <th style="text-align:center;width:38px">Pts</th>
      </tr></thead><tbody>`;

    standings.forEach((s, rank) => {
      const qualifies = rank < cfgQualify;
      const medal = rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : rank+1;
      const diff = s.sf - s.sa;
      const diffColor = diff > 0 ? '#6dbf6d' : diff < 0 ? '#e87a7a' : '#888';
      const rowStyle = qualifies ? `style="background:${c.bg}22"` : '';
      html += `<tr ${rowStyle}>
        <td style="font-size:14px">${medal}</td>
        <td style="font-weight:600;font-size:13px">${qualifies ? `<span style="color:${c.title}">▶ </span>` : ''}${s.name}</td>
        <td style="text-align:center">${s.p}</td>
        <td style="text-align:center">${s.w}</td>
        <td style="text-align:center">${s.l}</td>
        <td style="text-align:center;color:#555;font-size:12px">${s.sf}–${s.sa}</td>
        <td style="text-align:center;font-weight:600;color:${diffColor}">${diff>0?'+':''}${diff}</td>
        <td style="text-align:center;font-weight:700;color:#C9962A">${s.pts}</td>
      </tr>`;
    });

    html += `</tbody></table></div>`;
  });

  // Playoff CTA
  html += `<div class="card" style="text-align:center;padding:20px">
    <p class="info-text" style="margin-bottom:12px">${cfgGroups * cfgQualify} teams will qualify for playoffs</p>
    <button class="btn-playoff" onclick="generatePlayoffs(); showTab('playoffs')">Generate playoffs →</button>
    <div style="margin-top:10px">
      <button class="btn-danger" onclick="confirmReset()">Reset all</button>
    </div>
  </div>`;

  container.innerHTML = html;
}

function getGroupStandings(g) {
  const stats = g.teams.map(t => ({name:t, p:0, w:0, l:0, sf:0, sa:0, pts:0}));
  g.pairs.forEach(([hi,ai], idx) => {
    const s = g.scores[idx]; if (s.h===null||s.a===null) return;
    stats[hi].p++; stats[ai].p++;
    stats[hi].sf+=s.h; stats[hi].sa+=s.a;
    stats[ai].sf+=s.a; stats[ai].sa+=s.h;
    if (s.h > s.a) { stats[hi].w++; stats[ai].l++; stats[hi].pts+=3; }
    else if (s.a > s.h) { stats[ai].w++; stats[hi].l++; stats[ai].pts+=3; }
    else { stats[hi].pts+=1; stats[ai].pts+=1; }
  });
  return stats.sort((a,b) => b.pts-a.pts || b.w-a.w || (b.sf-b.sa)-(a.sf-a.sa));
}

function setGroupScore(gi, idx, side, val) {
  groups[gi].scores[idx][side] = val==='' ? null : parseInt(val);
  const s = groups[gi].scores[idx]; const done = s.h!==null && s.a!==null;
  // update badge inline
  const allRows = document.querySelectorAll(`#group-stage-content table`);
  renderGroupStage(); // re-render for standings update
  saveState();
}

// ─── PLAYOFFS ────────────────────────────────────────────
function generatePlayoffs() {
  // Collect qualifiers: top cfgQualify from each group, in seed order
  // Seeds: 1A,1B,1C... 2A,2B,2C...
  const seedSlots = [];
  for (let q = 0; q < cfgQualify; q++) {
    groups.forEach(g => {
      const standings = getGroupStandings(g);
      if (standings[q]) seedSlots.push(standings[q].name);
    });
  }

  const totalTeams = seedSlots.length;
  if (totalTeams < 2) { alert('Not enough qualifiers to generate playoffs.'); return; }

  // Pad to next power of 2
  const bracketSize = Math.pow(2, Math.ceil(Math.log2(totalTeams)));
  const seeds = [...seedSlots];
  while (seeds.length < bracketSize) seeds.push(null); // byes

  // Build first round: 1 vs last, 2 vs second-to-last...
  const firstRound = [];
  for (let i = 0; i < bracketSize/2; i++) {
    firstRound.push({teamA: seeds[i], teamB: seeds[bracketSize-1-i], scoreA:null, scoreB:null, winner:null});
  }

  // Build subsequent empty rounds
  playoffBracket = [firstRound];
  let size = bracketSize/4;
  while (size >= 1) {
    playoffBracket.push(Array.from({length:size}, () => ({teamA:null,teamB:null,scoreA:null,scoreB:null,winner:null})));
    size /= 2;
  }

  // Auto-advance byes
  firstRound.forEach((m,i) => {
    if (m.teamA && !m.teamB) { m.winner = m.teamA; advanceWinner(0,i); }
    else if (!m.teamA && m.teamB) { m.winner = m.teamB; advanceWinner(0,i); }
  });

  playoffGenerated = true;
  renderPlayoffs();
  saveState();
}

function advanceWinner(roundIdx, matchIdx) {
  if (roundIdx+1 >= playoffBracket.length) return;
  const nextMatch = Math.floor(matchIdx/2);
  const isA = matchIdx%2 === 0;
  const winner = playoffBracket[roundIdx][matchIdx].winner;
  if (isA) playoffBracket[roundIdx+1][nextMatch].teamA = winner;
  else playoffBracket[roundIdx+1][nextMatch].teamB = winner;
}

function setPlayoffScore(roundIdx, matchIdx, side, val) {
  const m = playoffBracket[roundIdx][matchIdx];
  m['score'+side] = val==='' ? null : parseInt(val);

  // Clear downstream if editing a completed match
  clearDownstream(roundIdx, matchIdx);

  if (m.scoreA !== null && m.scoreB !== null && m.scoreA !== m.scoreB) {
    m.winner = m.scoreA > m.scoreB ? m.teamA : m.teamB;
    advanceWinner(roundIdx, matchIdx);
  } else {
    m.winner = null;
  }
  renderPlayoffs(); saveState();
}

function clearDownstream(roundIdx, matchIdx) {
  let idx = matchIdx;
  for (let r = roundIdx+1; r < playoffBracket.length; r++) {
    idx = Math.floor(idx/2);
    const m = playoffBracket[r][idx];
    m.teamA = null; m.teamB = null; m.scoreA = null; m.scoreB = null; m.winner = null;
  }
}

function getRoundName(bracketSize, roundIdx) {
  const matchesInRound = bracketSize / Math.pow(2, roundIdx+1);
  if (matchesInRound === 1) return 'Final';
  if (matchesInRound === 2) return 'Semifinals';
  if (matchesInRound === 4) return 'Quarterfinals';
  if (matchesInRound === 8) return 'Round of 16';
  return `Round of ${matchesInRound*2}`;
}

function renderPlayoffs() {
  const container = document.getElementById('playoff-content');
  if (!playoffGenerated || !playoffBracket.length) {
    container.innerHTML = `<div class="card" style="text-align:center;padding:32px 20px">
      <p class="info-text" style="margin-bottom:16px">Complete the group stage, then generate the playoff bracket.</p>
      <button class="btn-playoff" onclick="generatePlayoffs()">Generate playoffs →</button>
    </div>`;
    return;
  }

  const bracketSize = playoffBracket[0].length * 2;
  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <span style="font-size:13px;color:#666">${bracketSize} teams bracket</span>
    <button class="btn-secondary" onclick="generatePlayoffs()">Regenerate</button>
  </div>`;

  // Check for champion
  const finalMatch = playoffBracket[playoffBracket.length-1][0];
  if (finalMatch.winner) {
    html += `<div class="card" style="text-align:center;padding:20px;border-color:#C9962A44;background:#1e1700">
      <div class="winner-crown">🏆</div>
      <div class="winner-name">${finalMatch.winner}</div>
      <p style="font-size:12px;color:#888;margin-top:6px">Champion</p>
    </div>`;
  }

  playoffBracket.forEach((round, ri) => {
    const roundName = getRoundName(bracketSize, ri);
    const isFinal = ri === playoffBracket.length-1;
    html += `<div class="bracket-round">
      <p class="round-title">${roundName}</p>`;

    round.forEach((m, mi) => {
      const isBye = (m.teamA && !m.teamB) || (!m.teamA && m.teamB);
      const canEdit = m.teamA && m.teamB && !isBye;
      const aWins = m.winner === m.teamA;
      const bWins = m.winner === m.teamB;

      const teamAClass = !m.teamA ? 'tbd' : aWins ? 'match-team-name winner' : bWins ? 'match-team-name loser' : 'match-team-name';
      const teamBClass = !m.teamB ? 'tbd' : bWins ? 'match-team-name winner' : aWins ? 'match-team-name loser' : 'match-team-name';
      const teamALabel = m.teamA || (ri===0 ? 'BYE' : 'TBD');
      const teamBLabel = m.teamB || (ri===0 ? 'BYE' : 'TBD');

      html += `<div class="match-card${isFinal?' final-match':''}">
        <div class="match-team">
          <span class="${teamAClass}">${aWins?'🏆 ':''}${teamALabel}</span>
          <input class="match-score" type="number" min="0" max="999" value="${m.scoreA??''}" placeholder="—"
            ${canEdit?`oninput="setPlayoffScore(${ri},${mi},'A',this.value)"`:'disabled'}/>
        </div>
        <div class="match-team">
          <span class="${teamBClass}">${bWins?'🏆 ':''}${teamBLabel}</span>
          <input class="match-score" type="number" min="0" max="999" value="${m.scoreB??''}" placeholder="—"
            ${canEdit?`oninput="setPlayoffScore(${ri},${mi},'B',this.value)"`:'disabled'}/>
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

// ─── RESET ───────────────────────────────────────────────
function confirmReset() { document.getElementById('reset-modal').style.display='flex'; }
function closeModal() { document.getElementById('reset-modal').style.display='none'; }
function resetAll() {
  closeModal();
  players=[]; groups=[]; drawnGroups=null; playoffBracket=[]; playoffGenerated=false;
  cfgTeams=8; cfgGroups=1; cfgQualify=2;
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('player-grid').innerHTML='';
  document.getElementById('player-count').textContent='0 players added';
  document.getElementById('draw-result').style.display='none';
  document.getElementById('redraw-btn').style.display='none';
  document.getElementById('apply-btn').style.display='none';
  document.getElementById('cfg-teams').value=8;
  document.getElementById('cfg-groups').value=1;
  document.getElementById('cfg-qualify').value=2;
  document.getElementById('group-stage-content').innerHTML='<div class="card" style="text-align:center;padding:32px 20px"><p class="info-text">Run the draw first to set up groups.</p></div>';
  document.getElementById('playoff-content').innerHTML='<div class="card" style="text-align:center;padding:32px 20px"><p class="info-text" style="margin-bottom:16px">Complete the group stage, then generate the playoff bracket.</p><button class="btn-playoff" onclick="generatePlayoffs()">Generate playoffs →</button></div>';
  updateConfig();
  showTab('players');
}
document.getElementById('reset-modal').addEventListener('click', e => { if(e.target===document.getElementById('reset-modal')) closeModal(); });

// ─── BOOT ────────────────────────────────────────────────
if (loadState()) {
  document.getElementById('cfg-teams').value = cfgTeams;
  document.getElementById('cfg-groups').value = cfgGroups;
  document.getElementById('cfg-qualify').value = cfgQualify;
  renderPlayers();
  if (groups.length) renderGroupStage();
  if (playoffGenerated) renderPlayoffs();
} else {
  updateConfig();
}
</script>
